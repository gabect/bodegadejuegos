<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcade Jungle</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="checker-depth" aria-hidden="true"></div>
    <main class="arcade-room" aria-label="Arcade Jungle game room">
      <header class="neon-sign" aria-label="Arcade Jungle neon sign">
        <h1 aria-label="Arcade Jungle">Arcade Jungle</h1>
      </header>

      <section class="cabinet-row" aria-label="Available arcade cabinets">
        <article class="mini-cabinet snake-cabinet">
          <a class="cabinet-link" href="games/jungle-snake/index.html" aria-label="Play Jungle Snake">
            <div class="cabinet-topper" aria-hidden="true"></div>
            <div class="marquee-panel">
              <h2>Jungle Snake</h2>
            </div>
            <div class="monitor-bezel" aria-hidden="true">
              <div class="crt-screen"></div>
            </div>
            <div class="control-panel">
              <span class="joystick" aria-hidden="true"></span>
              <span class="play-button">Play</span>
              <div class="button-bank" aria-hidden="true">
                <span class="arcade-button red"></span>
                <span class="arcade-button yellow"></span>
                <span class="arcade-button blue"></span>
              </div>
              <div class="coin-details" aria-hidden="true">
                <span></span><span></span>
              </div>
            </div>
          </a>
        </article>

        <article class="mini-cabinet reflex-cabinet">
          <a class="cabinet-link" href="games/reflex-80s/index.html" aria-label="Play Reflex 80s">
            <div class="cabinet-topper" aria-hidden="true"></div>
            <div class="marquee-panel">
              <h2>Reflex 80s</h2>
            </div>
            <div class="monitor-bezel" aria-hidden="true">
              <div class="crt-screen"></div>
            </div>
            <div class="control-panel">
              <span class="joystick" aria-hidden="true"></span>
              <span class="play-button">Play</span>
              <div class="button-bank" aria-hidden="true">
                <span class="arcade-button yellow"></span>
                <span class="arcade-button red"></span>
                <span class="arcade-button teal"></span>
              </div>
              <div class="coin-details" aria-hidden="true">
                <span></span><span></span>
              </div>
            </div>
          </a>
        </article>

        <article class="mini-cabinet galaxy-cabinet">
          <a class="cabinet-link" href="games/pixel-galaxy-defender/index.html" aria-label="Play Pixel Galaxy Defender">
            <div class="cabinet-topper" aria-hidden="true"></div>
            <div class="marquee-panel">
              <h2>Pixel Galaxy Defender</h2>
            </div>
            <div class="monitor-bezel" aria-hidden="true">
              <div class="crt-screen"></div>
            </div>
            <div class="control-panel">
              <span class="joystick" aria-hidden="true"></span>
              <span class="play-button">Play</span>
              <div class="button-bank" aria-hidden="true">
                <span class="arcade-button blue"></span>
                <span class="arcade-button red"></span>
                <span class="arcade-button yellow"></span>
              </div>
              <div class="coin-details" aria-hidden="true">
                <span></span><span></span>
              </div>
            </div>
          </a>
        </article>

        <article class="mini-cabinet echo-cabinet">
          <a class="cabinet-link" href="games/frontline-echo/index.html" aria-label="Play Frontline Echo">
            <div class="cabinet-topper" aria-hidden="true"></div>
            <div class="marquee-panel">
              <h2>Frontline Echo</h2>
            </div>
            <div class="monitor-bezel" aria-hidden="true">
              <div class="crt-screen"></div>
            </div>
            <div class="control-panel">
              <span class="joystick" aria-hidden="true"></span>
              <span class="play-button">Play</span>
              <div class="button-bank" aria-hidden="true">
                <span class="arcade-button teal"></span>
                <span class="arcade-button yellow"></span>
                <span class="arcade-button red"></span>
              </div>
              <div class="coin-details" aria-hidden="true">
                <span></span><span></span>
              </div>
            </div>
          </a>
        </article>
      </section>
    </main>

    <script>
      const root = document.documentElement;

      window.addEventListener("pointermove", (event) => {
        const x = (event.clientX / window.innerWidth - 0.5).toFixed(3);
        const y = (event.clientY / window.innerHeight - 0.5).toFixed(3);
        root.style.setProperty("--parallax-x", x);
        root.style.setProperty("--parallax-y", y);
      });

      window.addEventListener("scroll", () => {
        root.style.setProperty("--scroll-depth", (window.scrollY * 0.045).toFixed(2));
      }, { passive: true });
    </script>
  </body>
</html>
