<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reflex 80s - Arcade Jungle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a href="../../index.html" class="home-button">Home</a>
  <main class="game-page" aria-label="Reflex 80s game">
    <header class="game-header">
      <p class="kicker">Arcade Jungle • Instant play</p>
      <h1>Reflex 80s</h1>
      <p>Stay sharp, keep the ball alive, and push the run longer.</p>
    </header>

    <section class="screen-frame" aria-label="Reflex 80s play area">
      <canvas id="gameCanvas" width="900" height="620">
        Your browser needs HTML5 canvas support to play Reflex 80s.
      </canvas>
      <button id="restartButton" class="restart-button" type="button">Restart</button>
    </section>

    <section class="control-card" aria-label="Controls">
      <p><strong>Controls:</strong> Arrow Keys or A/D move • Drag/touch the screen on mobile • P pauses • Enter restarts after Game Over</p>
      <a href="../../index.html" class="back-link">Arcade Jungle</a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
