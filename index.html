<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Galaxy Defender</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <header class="title-panel" aria-label="Game title and instructions">
      <h1>Pixel Galaxy Defender</h1>
      <p>Move with <strong>← →</strong> or <strong>A D</strong>. Fire with <strong>Space</strong>. Restart with <strong>Enter</strong>.</p>
    </header>

    <section class="screen-wrap" aria-label="Pixel Galaxy Defender game area">
      <canvas id="gameCanvas" width="800" height="600">
        Your browser needs HTML5 canvas support to play Pixel Galaxy Defender.
      </canvas>
      <button id="restartButton" class="restart-button" type="button">Restart Mission</button>
    </section>

    <nav class="touch-controls" aria-label="Touch controls">
      <button id="leftButton" type="button" aria-label="Move left">◀</button>
      <button id="fireButton" type="button" aria-label="Fire laser">●</button>
      <button id="rightButton" type="button" aria-label="Move right">▶</button>
    </nav>
  </main>

  <script src="script.js"></script>
</body>
</html>
