name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Verify Vite Pages artifact
        run: |
          test -f dist/index.html
          test -d dist/assets
          grep -q 'src="/bodegadejuegos/assets/' dist/index.html
          grep -q 'href="/bodegadejuegos/assets/' dist/index.html
          ! grep -q './src/main.js' dist/index.html

      - name: Configure GitHub Pages for Actions deployment
        uses: actions/configure-pages@v5

      - name: Upload Vite dist artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
